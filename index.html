<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <main>
    <div class="con">
        <div class="in">
            <input type="text" class="in-tag">
        </div>

        <div class="btn">
           <div class="btn">

    <button class="btn-Tag util">AC</button>
    <button class="btn-Tag util">+/-</button>
    <button class="btn-Tag util">%</button>
    <button class="btn-Tag op">÷</button>

    <button class="btn-Tag num">7</button>
    <button class="btn-Tag num">8</button>
    <button class="btn-Tag num">9</button>
    <button class="btn-Tag op">×</button>

    <button class="btn-Tag num">4</button>
    <button class="btn-Tag num">5</button>
    <button class="btn-Tag num">6</button>
    <button class="btn-Tag op">−</button>

    <button class="btn-Tag num">1</button>
    <button class="btn-Tag num">2</button>
    <button class="btn-Tag num">3</button>
    <button class="btn-Tag op">+</button>

    <button class="btn-Tag num zero">0</button>
    <button class="btn-Tag num">.</button>
    <button class="btn-Tag eq">=</button>

</div>
        </div>

    </div>
   </main> 
   <script src="script.js"></script>
</body>
</html>
